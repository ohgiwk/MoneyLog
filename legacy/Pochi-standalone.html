<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Pochi - かんたん家計簿</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "Hiragino Sans", "Yu Gothic", "Helvetica Neue", Arial, sans-serif; background:#f1f3f6; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  .tab-active { color:#16a34a; }
  .tab-inactive { color:#94a3b8; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ---------- 定数 ---------- */
const EXPENSE_CATEGORIES = [
  { name: "食費", icon: "🍙", color: "#f97316" },
  { name: "日用品", icon: "🧻", color: "#0ea5e9" },
  { name: "交通費", icon: "🚃", color: "#6366f1" },
  { name: "住居費", icon: "🏠", color: "#8b5cf6" },
  { name: "通信費", icon: "📱", color: "#06b6d4" },
  { name: "娯楽", icon: "🎮", color: "#ec4899" },
  { name: "医療費", icon: "🏥", color: "#ef4444" },
  { name: "衣服・美容", icon: "👗", color: "#d946ef" },
  { name: "教育", icon: "📚", color: "#3b82f6" },
  { name: "その他", icon: "📦", color: "#64748b" },
];
const INCOME_CATEGORIES = [
  { name: "給与", icon: "💰", color: "#16a34a" },
  { name: "副業", icon: "💻", color: "#0d9488" },
  { name: "臨時収入", icon: "🎁", color: "#ca8a04" },
  { name: "その他収入", icon: "📦", color: "#64748b" },
];
const ALL_CATEGORIES = [...EXPENSE_CATEGORIES, ...INCOME_CATEGORIES];

const STORAGE_KEY_TX = "kakeibo_transactions_v1";
const STORAGE_KEY_BUDGET = "kakeibo_budgets_v1";

/* ---------- ユーティリティ ---------- */
function loadTransactions() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_TX);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function saveTransactions(list) {
  localStorage.setItem(STORAGE_KEY_TX, JSON.stringify(list));
}
function loadBudgets() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_BUDGET);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveBudgets(obj) {
  localStorage.setItem(STORAGE_KEY_BUDGET, JSON.stringify(obj));
}
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function monthKey(dateStr) {
  return dateStr.slice(0, 7); // YYYY-MM
}
function formatYen(n) {
  return "¥" + Math.round(n).toLocaleString("ja-JP");
}
function monthLabel(ym) {
  const [y, m] = ym.split("-");
  return `${y}年${parseInt(m, 10)}月`;
}
function shiftMonth(ym, delta) {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function categoryInfo(name) {
  return ALL_CATEGORIES.find((c) => c.name === name) || { icon: "📦", color: "#64748b" };
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ---------- 共通パーツ ---------- */
function MonthSwitcher({ month, setMonth }) {
  return (
    <div className="flex items-center justify-between px-4 py-3 bg-white border-b border-slate-100">
      <button onClick={() => setMonth(shiftMonth(month, -1))}
        className="w-9 h-9 rounded-full bg-slate-100 active:bg-slate-200 text-slate-600 text-lg">‹</button>
      <div className="font-bold text-slate-800 text-lg">{monthLabel(month)}</div>
      <button onClick={() => setMonth(shiftMonth(month, 1))}
        className="w-9 h-9 rounded-full bg-slate-100 active:bg-slate-200 text-slate-600 text-lg">›</button>
    </div>
  );
}

function ProgressBar({ ratio, color }) {
  const pct = Math.min(100, Math.round(ratio * 100));
  let barColor = color || "#16a34a";
  if (ratio > 1) barColor = "#dc2626";
  else if (ratio > 0.8) barColor = "#f59e0b";
  return (
    <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
      <div className="h-full rounded-full transition-all" style={{ width: pct + "%", background: barColor }}></div>
    </div>
  );
}

/* ---------- ダッシュボード ---------- */
function Dashboard({ month, setMonth, transactions, budgets }) {
  const monthTx = useMemo(() => transactions.filter((t) => monthKey(t.date) === month), [transactions, month]);
  const income = monthTx.filter((t) => t.type === "income").reduce((s, t) => s + t.amount, 0);
  const expense = monthTx.filter((t) => t.type === "expense").reduce((s, t) => s + t.amount, 0);
  const balance = income - expense;

  const byCategory = useMemo(() => {
    const map = {};
    monthTx.filter((t) => t.type === "expense").forEach((t) => {
      map[t.category] = (map[t.category] || 0) + t.amount;
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [monthTx]);

  const recent = [...monthTx].sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 5);

  const totalBudget = EXPENSE_CATEGORIES.reduce((s, c) => s + (budgets[c.name] || 0), 0);

  return (
    <div>
      <MonthSwitcher month={month} setMonth={setMonth} />
      <div className="p-4 space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <div className="bg-white rounded-2xl p-4 shadow-sm">
            <div className="text-xs text-slate-400 mb-1">収入</div>
            <div className="text-lg font-bold text-emerald-600">{formatYen(income)}</div>
          </div>
          <div className="bg-white rounded-2xl p-4 shadow-sm">
            <div className="text-xs text-slate-400 mb-1">支出</div>
            <div className="text-lg font-bold text-rose-500">{formatYen(expense)}</div>
          </div>
        </div>

        <div className="bg-gradient-to-r from-emerald-500 to-teal-500 rounded-2xl p-4 shadow-sm text-white">
          <div className="text-xs opacity-80 mb-1">今月の収支</div>
          <div className="text-2xl font-bold">{balance >= 0 ? "+" : ""}{formatYen(balance)}</div>
        </div>

        {totalBudget > 0 && (
          <div className="bg-white rounded-2xl p-4 shadow-sm">
            <div className="flex justify-between items-center mb-2">
              <div className="text-sm font-semibold text-slate-700">予算消化率(全体)</div>
              <div className="text-xs text-slate-400">{formatYen(expense)} / {formatYen(totalBudget)}</div>
            </div>
            <ProgressBar ratio={totalBudget ? expense / totalBudget : 0} />
          </div>
        )}

        <div className="bg-white rounded-2xl p-4 shadow-sm">
          <div className="text-sm font-semibold text-slate-700 mb-3">カテゴリ別支出</div>
          {byCategory.length === 0 && <div className="text-sm text-slate-400 py-2">支出データがありません</div>}
          <div className="space-y-3">
            {byCategory.map(([cat, amt]) => {
              const info = categoryInfo(cat);
              const ratio = expense ? amt / expense : 0;
              return (
                <div key={cat}>
                  <div className="flex justify-between text-sm mb-1">
                    <span>{info.icon} {cat}</span>
                    <span className="text-slate-500">{formatYen(amt)}</span>
                  </div>
                  <ProgressBar ratio={ratio} color={info.color} />
                </div>
              );
            })}
          </div>
        </div>

        <div className="bg-white rounded-2xl p-4 shadow-sm">
          <div className="text-sm font-semibold text-slate-700 mb-3">最近の記録</div>
          {recent.length === 0 && <div className="text-sm text-slate-400 py-2">記録がありません</div>}
          <div className="space-y-2">
            {recent.map((t) => {
              const info = categoryInfo(t.category);
              return (
                <div key={t.id} className="flex justify-between items-center py-1.5 border-b border-slate-50 last:border-0">
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{info.icon}</span>
                    <div>
                      <div className="text-sm text-slate-700">{t.category}</div>
                      <div className="text-xs text-slate-400">{t.date}{t.memo ? " ・ " + t.memo : ""}</div>
                    </div>
                  </div>
                  <div className={"text-sm font-semibold " + (t.type === "income" ? "text-emerald-600" : "text-rose-500")}>
                    {t.type === "income" ? "+" : "-"}{formatYen(t.amount)}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- 入力 / 履歴 ---------- */
function InputTab({ month, setMonth, transactions, addTx, deleteTx }) {
  const [type, setType] = useState("expense");
  const [date, setDate] = useState(todayStr());
  const [category, setCategory] = useState(EXPENSE_CATEGORIES[0].name);
  const [amount, setAmount] = useState("");
  const [memo, setMemo] = useState("");

  const categories = type === "expense" ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;

  useEffect(() => {
    setCategory(categories[0].name);
  }, [type]);

  const monthTx = useMemo(
    () => transactions.filter((t) => monthKey(t.date) === month).sort((a, b) => (a.date < b.date ? 1 : -1)),
    [transactions, month]
  );

  function handleSubmit(e) {
    e.preventDefault();
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return;
    addTx({ id: uid(), type, date, category, amount: amt, memo: memo.trim() });
    setAmount("");
    setMemo("");
  }

  return (
    <div>
      <MonthSwitcher month={month} setMonth={setMonth} />
      <div className="p-4 space-y-4">
        <form onSubmit={handleSubmit} className="bg-white rounded-2xl p-4 shadow-sm space-y-3">
          <div className="flex rounded-xl bg-slate-100 p-1">
            <button type="button" onClick={() => setType("expense")}
              className={"flex-1 py-2 rounded-lg text-sm font-semibold transition " + (type === "expense" ? "bg-rose-500 text-white shadow" : "text-slate-500")}>
              支出
            </button>
            <button type="button" onClick={() => setType("income")}
              className={"flex-1 py-2 rounded-lg text-sm font-semibold transition " + (type === "income" ? "bg-emerald-500 text-white shadow" : "text-slate-500")}>
              収入
            </button>
          </div>

          <div>
            <label className="text-xs text-slate-400">日付</label>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)}
              className="w-full mt-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-300" />
          </div>

          <div>
            <label className="text-xs text-slate-400">カテゴリ</label>
            <div className="grid grid-cols-5 gap-2 mt-1">
              {categories.map((c) => (
                <button key={c.name} type="button" onClick={() => setCategory(c.name)}
                  className={"flex flex-col items-center justify-center py-2 rounded-xl text-xs gap-1 border " +
                    (category === c.name ? "border-emerald-400 bg-emerald-50" : "border-slate-100 bg-slate-50")}>
                  <span className="text-lg">{c.icon}</span>
                  <span className="text-[10px] leading-tight text-slate-600 text-center">{c.name}</span>
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="text-xs text-slate-400">金額</label>
            <input type="number" inputMode="numeric" placeholder="0" value={amount}
              onChange={(e) => setAmount(e.target.value)}
              className="w-full mt-1 border border-slate-200 rounded-xl px-3 py-2 text-lg font-semibold focus:outline-none focus:ring-2 focus:ring-emerald-300" />
          </div>

          <div>
            <label className="text-xs text-slate-400">メモ(任意)</label>
            <input type="text" placeholder="例: スーパーで買い物" value={memo}
              onChange={(e) => setMemo(e.target.value)}
              className="w-full mt-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-300" />
          </div>

          <button type="submit"
            className={"w-full py-3 rounded-xl text-white font-semibold shadow " + (type === "expense" ? "bg-rose-500 active:bg-rose-600" : "bg-emerald-500 active:bg-emerald-600")}>
            記録する
          </button>
        </form>

        <div className="bg-white rounded-2xl p-4 shadow-sm">
          <div className="text-sm font-semibold text-slate-700 mb-3">{monthLabel(month)}の記録一覧</div>
          {monthTx.length === 0 && <div className="text-sm text-slate-400 py-2">この月の記録はまだありません</div>}
          <div className="space-y-2">
            {monthTx.map((t) => {
              const info = categoryInfo(t.category);
              return (
                <div key={t.id} className="flex justify-between items-center py-2 border-b border-slate-50 last:border-0">
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{info.icon}</span>
                    <div>
                      <div className="text-sm text-slate-700">{t.category}</div>
                      <div className="text-xs text-slate-400">{t.date}{t.memo ? " ・ " + t.memo : ""}</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className={"text-sm font-semibold " + (t.type === "income" ? "text-emerald-600" : "text-rose-500")}>
                      {t.type === "income" ? "+" : "-"}{formatYen(t.amount)}
                    </div>
                    <button onClick={() => deleteTx(t.id)} className="text-slate-300 active:text-rose-500 text-sm">✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- 予算 ---------- */
function BudgetTab({ month, setMonth, transactions, budgets, setBudgets }) {
  const [draft, setDraft] = useState({});

  useEffect(() => {
    setDraft(budgets);
  }, [budgets]);

  const monthExpense = useMemo(() => {
    const map = {};
    transactions
      .filter((t) => t.type === "expense" && monthKey(t.date) === month)
      .forEach((t) => { map[t.category] = (map[t.category] || 0) + t.amount; });
    return map;
  }, [transactions, month]);

  function updateDraft(name, value) {
    setDraft((d) => ({ ...d, [name]: value }));
  }
  function saveOne(name) {
    const val = parseFloat(draft[name]);
    const next = { ...budgets, [name]: isNaN(val) || val <= 0 ? 0 : val };
    setBudgets(next);
  }

  const totalBudget = EXPENSE_CATEGORIES.reduce((s, c) => s + (budgets[c.name] || 0), 0);
  const totalSpent = Object.values(monthExpense).reduce((s, v) => s + v, 0);

  return (
    <div>
      <MonthSwitcher month={month} setMonth={setMonth} />
      <div className="p-4 space-y-4">
        <div className="bg-white rounded-2xl p-4 shadow-sm">
          <div className="flex justify-between items-center mb-2">
            <div className="text-sm font-semibold text-slate-700">全体の予算消化</div>
            <div className="text-xs text-slate-400">{formatYen(totalSpent)} / {formatYen(totalBudget)}</div>
          </div>
          <ProgressBar ratio={totalBudget ? totalSpent / totalBudget : 0} />
          <div className="text-xs text-slate-400 mt-2">
            残り {formatYen(Math.max(0, totalBudget - totalSpent))}
            {totalBudget > 0 && totalSpent > totalBudget ? "(予算超過)" : ""}
          </div>
        </div>

        <div className="text-xs text-slate-400 px-1">カテゴリごとの月間予算を設定してください。設定後は毎月この金額で消化率を計算します。</div>

        <div className="space-y-3">
          {EXPENSE_CATEGORIES.map((c) => {
            const spent = monthExpense[c.name] || 0;
            const budget = budgets[c.name] || 0;
            const ratio = budget ? spent / budget : 0;
            return (
              <div key={c.name} className="bg-white rounded-2xl p-4 shadow-sm">
                <div className="flex justify-between items-center mb-2">
                  <div className="text-sm font-semibold text-slate-700">{c.icon} {c.name}</div>
                  <div className="text-xs text-slate-400">{formatYen(spent)}{budget ? " / " + formatYen(budget) : ""}</div>
                </div>
                {budget > 0 && <div className="mb-3"><ProgressBar ratio={ratio} color={c.color} /></div>}
                <div className="flex gap-2">
                  <input type="number" inputMode="numeric" placeholder="予算額を入力"
                    value={draft[c.name] === undefined || draft[c.name] === 0 ? "" : draft[c.name]}
                    onChange={(e) => updateDraft(c.name, e.target.value)}
                    className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-300" />
                  <button onClick={() => saveOne(c.name)}
                    className="px-4 py-2 rounded-xl bg-slate-800 text-white text-sm font-semibold active:bg-slate-700">
                    保存
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ---------- アプリ全体 ---------- */
function App() {
  const [tab, setTab] = useState("dashboard");
  const [month, setMonth] = useState(todayStr().slice(0, 7));
  const [transactions, setTransactions] = useState(loadTransactions);
  const [budgets, setBudgets] = useState(loadBudgets);

  useEffect(() => saveTransactions(transactions), [transactions]);
  useEffect(() => saveBudgets(budgets), [budgets]);

  function addTx(tx) {
    setTransactions((prev) => [...prev, tx]);
  }
  function deleteTx(id) {
    setTransactions((prev) => prev.filter((t) => t.id !== id));
  }

  const tabs = [
    { key: "dashboard", label: "ホーム", icon: "🏠" },
    { key: "input", label: "記録", icon: "✏️" },
    { key: "budget", label: "予算", icon: "🎯" },
  ];

  return (
    <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col" style={{ minHeight: "100vh" }}>
      <div className="sticky top-0 z-10 bg-white border-b border-slate-100">
        <div className="px-4 py-3 flex items-center gap-2">
          <span className="text-2xl">💰</span>
          <span className="font-bold text-lg text-slate-800">Pochi</span>
        </div>
      </div>

      <div className="flex-1 pb-20">
        {tab === "dashboard" && <Dashboard month={month} setMonth={setMonth} transactions={transactions} budgets={budgets} />}
        {tab === "input" && <InputTab month={month} setMonth={setMonth} transactions={transactions} addTx={addTx} deleteTx={deleteTx} />}
        {tab === "budget" && <BudgetTab month={month} setMonth={setMonth} transactions={transactions} budgets={budgets} setBudgets={setBudgets} />}
      </div>

      <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-100 flex justify-around py-2 shadow-[0_-2px_8px_rgba(0,0,0,0.04)]">
        {tabs.map((t) => (
          <button key={t.key} onClick={() => setTab(t.key)}
            className={"flex flex-col items-center gap-0.5 px-6 py-1 " + (tab === t.key ? "tab-active" : "tab-inactive")}>
            <span className="text-xl">{t.icon}</span>
            <span className="text-[11px] font-medium">{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
